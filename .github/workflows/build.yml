name: DeadZone Lite Build

on:
  workflow_dispatch:
    inputs:
      rom_link:
        description: "Direct ROM link for the DeadZone Lite build"
        required: true
      request_source:
        description: "Request source label"
        required: false
        default: "telegram"

jobs:
  build-lite:
    name: Build DeadZone Lite
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      MEZO_PRIVATE_CHAT_ID: ${{ secrets.MEZO_PRIVATE_CHAT_ID }}
      TELEGRAM_RELEASE_GROUP_ID: ${{ secrets.TELEGRAM_RELEASE_GROUP_ID }}
      RCLONE_CONFIG_BASE64: ${{ secrets.RCLONE_CONFIG_BASE64 }}
      RCLONE_REMOTE_NAME: ${{ secrets.RCLONE_REMOTE_NAME }}
      RCLONE_UPLOAD_DIR: ${{ secrets.RCLONE_UPLOAD_DIR }}

    steps:
      - name: Set current stage
        run: echo "CURRENT_STAGE=checkout" >> "$GITHUB_ENV"

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 512
          remove-dotnet: "true"
          remove-android: "true"
          remove-haskell: "true"

      - name: Clean unused packages
        run: |
          docker rmi $(docker images -q) || true
          sudo rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d || true
          sudo apt -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell mysql* php* || true
          sudo apt -y autoremove --purge || true
          sudo apt -y autoclean || true
          sudo apt clean || true

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Mark request acknowledgement stage
        run: echo "CURRENT_STAGE=request_acknowledged" >> "$GITHUB_ENV"

      - name: Notify MEZO about request
        run: python3 notify.py private request_received

      - name: Mark dependency stage
        run: echo "CURRENT_STAGE=install_dependencies" >> "$GITHUB_ENV"

      - name: Set timezone
        run: sudo timedatectl set-timezone Africa/Cairo

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install dependencies
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends software-properties-common ca-certificates curl gnupg file git

          sudo add-apt-repository -y universe || true
          sudo apt-get update

          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            aria2 \
            jq \
            python3 \
            python3-pip \
            python-is-python3 \
            wget \
            curl \
            unzip \
            zip \
            p7zip-full \
            zstd \
            lz4 \
            xz-utils \
            bc \
            file \
            git \
            openssl \
            ca-certificates \
            xmlstarlet \
            device-tree-compiler \
            erofs-utils \
            android-sdk-libsparse-utils \
            busybox \
            zlib1g-dev \
            gcc \
            g++ || true

          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends rclone || curl -fsSL https://rclone.org/install.sh | sudo bash

          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends aapt zipalign || true

          if ! command -v aapt >/dev/null 2>&1 || ! command -v zipalign >/dev/null 2>&1; then
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends android-sdk-build-tools android-sdk-build-tools-common || true
          fi

          if command -v aapt >/dev/null 2>&1 && ! command -v zipalign >/dev/null 2>&1; then
            build_tools_dir=$(dirname "$(command -v aapt)")
            if [[ -x "${build_tools_dir}/zipalign" ]]; then
              sudo ln -sf "${build_tools_dir}/zipalign" /usr/local/bin/zipalign
            fi
          fi

          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user ConfigObj requests
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          for tool in aria2c jq python3 unzip zip 7z zstd lz4 xmlstarlet dtc rclone aapt zipalign; do
            command -v "$tool" >/dev/null 2>&1 || {
              echo "Missing required tool: $tool"
              exit 1
            }
          done

      - name: Grant execute permissions
        run: chmod -R 777 .

      - name: Mark parse stage
        run: echo "CURRENT_STAGE=parse_rom_metadata" >> "$GITHUB_ENV"

      - name: Build DeadZone Lite
        env:
          INPUT_URL: ${{ inputs.rom_link }}
        run: bash build.sh "$INPUT_URL"

      - name: Mark packaging stage
        run: echo "CURRENT_STAGE=package" >> "$GITHUB_ENV"

      - name: Notify packaging stage
        run: python3 notify.py private packaging_started

      - name: Package DeadZone Lite
        run: bash packROM.sh

      - name: Mark rclone setup stage
        run: echo "CURRENT_STAGE=setup_rclone" >> "$GITHUB_ENV"

      - name: Set up rclone
        run: bash uploadROM.sh setup

      - name: Mark upload stage
        run: echo "CURRENT_STAGE=upload_drive" >> "$GITHUB_ENV"

      - name: Notify upload stage
        run: python3 notify.py private upload_started

      - name: Upload to Google Drive
        run: bash uploadROM.sh

      - name: Notify MEZO about success
        if: success()
        run: python3 notify.py private success

      - name: Mark release stage
        if: success()
        run: echo "CURRENT_STAGE=release_post" >> "$GITHUB_ENV"

      - name: Post release message
        if: success()
        run: python3 notify.py release success

      - name: Notify MEZO about failure
        if: failure()
        run: python3 notify.py private fail
